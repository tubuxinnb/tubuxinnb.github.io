# Core site settings. Most of the content and style switches can be edited here.
title: "Alex Chen"
description: "Academic homepage of Alex Chen, a PhD student in Computer Science working on machine learning and language technologies."
# Leave blank in the template. Set this to your final site URL before publishing.
url: ""
baseurl: ""
lang: "en"
timezone: "America/Los_Angeles"
repository: "tubuxinnb/buxin.github.io"
email: "alex.chen@redwood.edu"

author:
  name: "Alex Chen"
  position: "PhD Student in Computer Science"
  affiliation: "Redwood University"
  department: "Department of Computer Science"
  advisor: "Advised by Prof. Mira Lawson"
  location: "Redwood City, California"
  short_bio: "I study natural language processing, human-centered AI, and efficient machine learning systems."
  bio: "I am a PhD student in Computer Science at Redwood University. My research sits at the intersection of language, learning, and human-centered AI. I am especially interested in building methods that are reliable, interpretable, and useful in real settings."
  research_interests:
    - Natural language processing
    - Human-centered AI
    - Efficient machine learning
    - Evaluation and interpretability

# Visual tuning. The CSS reads these values and applies one of three calibrated modes.
style_mode: "piech" # piech / hewitt / bingyao
font_style: "serif" # serif / sans / mixed
accent_color: "#6f7c8b"

show:
  news: true
  projects: true
  teaching: true
  profile_photo: true
  publication_abstracts: false
  selected_publications_on_home: true
  experience: true
  dark_mode: false

home:
  news_limit: 5
  selected_publications_limit: 3
  project_limit: 2

avatar: "/assets/images/avatar-placeholder.svg"
logo: "/assets/images/avatar-placeholder.svg"
image: "/assets/images/og-card.svg"
default_social_image: "/assets/images/og-card.svg"
footer_text: "© 2026 Alex Chen. Built with Jekyll and GitHub Pages."

# Keep this list ordered; it is rendered directly in the homepage header.
social_links:
  - label: "Scholar"
    url: "https://scholar.google.com/"
  - label: "Semantic Scholar"
    url: "https://www.semanticscholar.org/"
  - label: "GitHub"
    url: "https://github.com/alexchen"
  - label: "ORCID"
    url: "https://orcid.org/"
  - label: "CV"
    url: "/cv/"
  - label: "X"
    url: "https://x.com/"

markdown: kramdown
permalink: pretty

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      layout: page
      image: "/assets/images/og-card.svg"

sass:
  style: compressed

exclude:
  - vendor
  - node_modules
  - package.json
  - package-lock.json
