# Core site settings. Most of the content and style switches can be edited here.
title: "Buxin Tu"
description: "Personal homepage of Buxin Tu at the University of Science and Technology of China."
# Leave blank in the template. Set this to your final site URL before publishing.
url: ""
baseurl: ""
lang: "en"
timezone: "Asia/Shanghai"
repository: "tubuxinnb/buxin.github.io"
email: "tubuxin0621@gmail.com"

author:
  name: "Buxin Tu"
  position: "M.S. Student in Computer Science and Technology"
  affiliation: "University of Science and Technology of China"
  department: "School of Computer Science and Technology"
  advisor: "Advisor: Prof. Hong An"
  location: ""
  short_bio: ""
  bio: "I am Buxin Tu, an M.S. student in Computer Science and Technology at the University of Science and Technology of China, advised by Prof. Hong An. My work focuses on computer architecture and high-performance computing, and I am also interested in LLM systems and the use of LLMs for architecture research."
  research_interests:
    - Memory Systems
    - LLM for Arch
    - Near-Data Processing
    - LLM systems

# Visual tuning. The CSS reads these values and applies one of three calibrated modes.
style_mode: "piech" # piech / hewitt / bingyao
font_style: "sans" # serif / sans / mixed
accent_color: "#6f7c8b"

show:
  news: false
  projects: false
  teaching: false
  profile_photo: true
  publication_abstracts: false
  selected_publications_on_home: true
  experience: true
  dark_mode: false

home:
  news_limit: 5
  selected_publications_limit: 3
  project_limit: 2

avatar: "/assets/images/Buxin.jpeg"
logo: "/assets/images/Buxin.jpeg"
image: "/assets/images/og-card.svg"
default_social_image: "/assets/images/og-card.svg"
footer_text: "© 2026 Buxin Tu. Built with Codex and GitHub Pages."

# Keep this list ordered; it is rendered directly in the homepage header.
social_links:
  - label: "GitHub"
    icon: "github"
    url: "https://github.com/tubuxinnb"
  # Add your Google Scholar profile URL here later.
  # - label: "Google Scholar"
  #   url: ""
  # Add X later if you want it to appear in the header.
  # - label: "X"
  #   url: ""

markdown: kramdown
permalink: pretty

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      layout: page
      image: "/assets/images/og-card.svg"

sass:
  style: compressed

exclude:
  - vendor
  - node_modules
  - package.json
  - package-lock.json
